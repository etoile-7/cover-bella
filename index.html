<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>录播封面生成</title>
    <link rel="preload" href="assets/ChillRoundF.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/cover-template.webp" as="image" type="image/webp">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="封面生成器">
        <div class="panel controls">
          <div class="brand">
            <p class="eyebrow">CoverCreate</p>
            <h1>录播封面生成</h1>
            <p class="subline">静态封面工作台</p>
          </div>

          <label class="drop-zone" for="imageInput" id="dropZone">
            <input id="imageInput" type="file" accept="image/*">
            <span class="drop-title">上传截图</span>
            <span class="drop-meta" id="fileName">PNG / JPG / WebP，右键粘贴</span>
          </label>
          <div class="paste-menu" id="pasteMenu" hidden>
            <button type="button" id="pasteImageButton">粘贴图片</button>
          </div>

          <div class="field">
            <label for="titleInput">直播标题</label>
            <div class="title-builder">
              <div class="title-tags" aria-label="标题前缀">
                <label class="tag-option">
                  <input type="radio" name="titleTag" value="【3D】" checked>
                  <span>【3D】</span>
                </label>
                <label class="tag-option">
                  <input type="radio" name="titleTag" value="【突击】">
                  <span>【突击】</span>
                </label>
              </div>
              <input id="titleInput" type="text" value="环游世界歌回" autocomplete="off">
            </div>
          </div>

          <div class="field">
            <label for="dateInput">直播日期</label>
            <input id="dateInput" type="date">
          </div>

          <div class="actions">
            <button type="button" class="secondary" id="resetCropButton">重置裁切</button>
            <a class="primary disabled" id="downloadLink" href="#" aria-disabled="true">下载封面</a>
          </div>
        </div>

        <div class="panel preview-panel">
          <div class="preview-head">
            <div>
              <p class="eyebrow">Output</p>
              <h2>1920 x 1080</h2>
            </div>
            <span class="status" id="statusText">等待图片</span>
          </div>
          <div class="canvas-wrap">
            <canvas id="coverCanvas" width="1920" height="1080" tabindex="0" aria-label="封面预览"></canvas>
          </div>
        </div>
      </section>
    </main>

    <dialog class="confirm-dialog" id="missingPrefixDialog" aria-labelledby="missingPrefixTitle">
      <form method="dialog" class="confirm-box">
        <p class="eyebrow">导出确认</p>
        <h2 id="missingPrefixTitle">未添加标题前缀，是否继续导出？</h2>
        <div class="confirm-actions">
          <button type="submit" class="secondary" value="cancel">取消</button>
          <button type="submit" class="primary" value="continue">继续</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
